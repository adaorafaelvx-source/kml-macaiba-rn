<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 224</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 224</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.836990444444444, -35.33563688888889], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.836417, -35.335603], [-5.838408, -35.336527], [-5.838589, -35.336165], [-5.836716, -35.335289], [-5.836684, -35.335329], [-5.836625, -35.335378], [-5.836566, -35.335415], [-5.836492, -35.335423], [-5.836417, -35.335603]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
