<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 345</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 345</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.818468304347826, -35.31282639130435], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.817409, -35.311515], [-5.817187, -35.312871], [-5.817732, -35.31463], [-5.817884, -35.314566], [-5.818301, -35.314288], [-5.818449, -35.314199], [-5.819044, -35.31385], [-5.818935, -35.313618], [-5.818924, -35.313572], [-5.818938, -35.313441], [-5.818991, -35.313182], [-5.819016, -35.31293], [-5.819036, -35.31264], [-5.819024, -35.312454], [-5.819007, -35.312224], [-5.818971, -35.312145], [-5.818935, -35.312112], [-5.818773, -35.312006], [-5.818568, -35.311927], [-5.818369, -35.311878], [-5.8181, -35.311791], [-5.817769, -35.311653], [-5.817409, -35.311515]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
