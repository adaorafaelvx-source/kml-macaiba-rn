<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 188</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 188</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8434090625, -35.3407910625], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.841794, -35.34122], [-5.842439, -35.341777], [-5.842758, -35.341392], [-5.843293, -35.34076], [-5.843373, -35.340658], [-5.843404, -35.340636], [-5.843444, -35.340633], [-5.843493, -35.340648], [-5.843788, -35.340902], [-5.844471, -35.34148], [-5.84484, -35.341046], [-5.844532, -35.340765], [-5.844002, -35.340231], [-5.84369, -35.339837], [-5.84343, -35.339452], [-5.841794, -35.34122]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
