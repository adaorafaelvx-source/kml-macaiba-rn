<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 320</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 320</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8564552857142855, -35.34832446428572], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.856784, -35.349318], [-5.857453, -35.347567], [-5.856832, -35.347267], [-5.856698, -35.347216], [-5.85666, -35.347197], [-5.856317, -35.347033], [-5.855962, -35.346946], [-5.855978, -35.347052], [-5.856016, -35.347261], [-5.85607, -35.347398], [-5.856106, -35.347553], [-5.85614, -35.347865], [-5.856176, -35.347956], [-5.856232, -35.348042], [-5.856312, -35.348111], [-5.856413, -35.348222], [-5.85652, -35.348344], [-5.856547, -35.348502], [-5.856553, -35.348672], [-5.856462, -35.349174], [-5.856445, -35.349263], [-5.856447, -35.349329], [-5.856475, -35.349573], [-5.85651, -35.349792], [-5.856543, -35.349912], [-5.856586, -35.349726], [-5.856727, -35.349476], [-5.856784, -35.349318]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
