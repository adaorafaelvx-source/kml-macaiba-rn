<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 167</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 167</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8469524375, -35.34414175], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.845854, -35.344518], [-5.846486, -35.345079], [-5.846927, -35.344577], [-5.846993, -35.344494], [-5.847055, -35.344459], [-5.847164, -35.344435], [-5.84761, -35.344309], [-5.847756, -35.344282], [-5.847826, -35.344218], [-5.847273, -35.343738], [-5.84706, -35.343553], [-5.846959, -35.343553], [-5.84687, -35.343537], [-5.846812, -35.343502], [-5.84674, -35.343496], [-5.845854, -35.344518]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
