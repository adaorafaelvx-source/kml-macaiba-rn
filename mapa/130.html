<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 130</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 130</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.850850181818182, -35.34638781818182], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.850723, -35.346973], [-5.85143, -35.345888], [-5.851121, -35.345679], [-5.85076, -35.346226], [-5.850763, -35.346253], [-5.850783, -35.346289], [-5.850846, -35.346334], [-5.850852, -35.346373], [-5.850795, -35.346477], [-5.850556, -35.346801], [-5.850723, -35.346973]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
