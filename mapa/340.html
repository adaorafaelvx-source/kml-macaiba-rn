<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 340</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 340</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8210768823529415, -35.31356241176471], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.820175, -35.313333], [-5.820216, -35.313533], [-5.820919, -35.313542], [-5.820953, -35.313548], [-5.820981, -35.313558], [-5.820996, -35.313581], [-5.820998, -35.313613], [-5.820969, -35.31378], [-5.821012, -35.313802], [-5.821266, -35.313962], [-5.821461, -35.313695], [-5.82154, -35.313599], [-5.821628, -35.313512], [-5.821671, -35.313452], [-5.821707, -35.313377], [-5.82164, -35.313341], [-5.820175, -35.313333]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
