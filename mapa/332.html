<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 332</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 332</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.827266571428572, -35.31799328571429], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.826857, -35.317301], [-5.826789, -35.317365], [-5.826445, -35.319087], [-5.827939, -35.318795], [-5.828, -35.318755], [-5.827979, -35.317349], [-5.826857, -35.317301]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
