<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 334</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 334</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.823083235294117, -35.31559823529412], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.824117, -35.315471], [-5.823594, -35.315266], [-5.823504, -35.315218], [-5.8234, -35.315113], [-5.823333, -35.315122], [-5.823209, -35.315157], [-5.8231, -35.31522], [-5.823011, -35.315287], [-5.822874, -35.315377], [-5.822667, -35.315501], [-5.822382, -35.315658], [-5.822135, -35.315814], [-5.822024, -35.315906], [-5.822449, -35.316191], [-5.823039, -35.316583], [-5.82346, -35.316815], [-5.824117, -35.315471]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
