<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 342</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 342</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.820503882352941, -35.314015647058824], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.820214, -35.313587], [-5.820215, -35.313601], [-5.820275, -35.313939], [-5.820326, -35.314224], [-5.820226, -35.314442], [-5.820352, -35.314509], [-5.820444, -35.314336], [-5.82045, -35.314313], [-5.820525, -35.314315], [-5.820611, -35.314286], [-5.820693, -35.314008], [-5.820699, -35.313978], [-5.820876, -35.313986], [-5.820918, -35.313948], [-5.820948, -35.313613], [-5.82058, -35.313594], [-5.820214, -35.313587]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
