<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 420</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 420</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.874171111111111, -35.30177011111111], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.872381, -35.303563], [-5.878225, -35.300756], [-5.878649, -35.29942], [-5.878467, -35.299372], [-5.875799, -35.300514], [-5.875727, -35.300557], [-5.875695, -35.300622], [-5.875695, -35.300689], [-5.875743, -35.300855], [-5.875775, -35.300914], [-5.87514, -35.30119], [-5.87501, -35.300908], [-5.874967, -35.300863], [-5.874908, -35.300855], [-5.874844, -35.300863], [-5.8717, -35.302289], [-5.871894, -35.302552], [-5.871956, -35.302584], [-5.872017, -35.302667], [-5.87206, -35.302788], [-5.872137, -35.302954], [-5.872228, -35.303102], [-5.872236, -35.303204], [-5.872276, -35.303279], [-5.872343, -35.303372], [-5.872367, -35.303498], [-5.872381, -35.303563]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
