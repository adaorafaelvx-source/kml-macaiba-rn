<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 114</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 114</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.855817428571428, -35.349368857142856], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.854725, -35.349723], [-5.855732, -35.350058], [-5.856112, -35.350183], [-5.856159, -35.350191], [-5.856259, -35.350009], [-5.856281, -35.349922], [-5.856261, -35.349821], [-5.856137, -35.349476], [-5.855922, -35.348752], [-5.855919, -35.34866], [-5.855929, -35.34853], [-5.855984, -35.348252], [-5.855299, -35.347864], [-5.854725, -35.349723]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
