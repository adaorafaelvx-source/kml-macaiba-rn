<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 109</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 109</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.857119176470588, -35.34984917647059], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.857941, -35.349141], [-5.857461, -35.348956], [-5.857028, -35.34879], [-5.856757, -35.34949], [-5.856608, -35.349748], [-5.856561, -35.349957], [-5.856602, -35.35005], [-5.856686, -35.350187], [-5.856768, -35.350257], [-5.856864, -35.350313], [-5.856962, -35.350385], [-5.857062, -35.350462], [-5.857174, -35.350555], [-5.8573, -35.350382], [-5.85754, -35.350052], [-5.857771, -35.34957], [-5.857941, -35.349141]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
