<!DOCTYPE html>
<html>
<head>

<body>
<div id="info">Quadra 152</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.84781895, -35.342108350000004], 17);

  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
