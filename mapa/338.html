<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 338</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 338</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.823666444444445, -35.315062555555556], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.822606, -35.315499], [-5.822949, -35.315287], [-5.823086, -35.31519], [-5.82321, -35.315116], [-5.823323, -35.315084], [-5.823448, -35.315051], [-5.823692, -35.314919], [-5.823768, -35.314842], [-5.823988, -35.314746], [-5.824374, -35.314613], [-5.824256, -35.315113], [-5.824249, -35.315163], [-5.824156, -35.31548], [-5.824117, -35.315471], [-5.824282, -35.315533], [-5.824658, -35.314264], [-5.823228, -35.314256], [-5.822606, -35.315499]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
