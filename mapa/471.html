<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 471</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 471</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.874909578947369, -35.30076815789474], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.871444, -35.302351], [-5.873758, -35.301294], [-5.87441, -35.30101], [-5.874834, -35.300815], [-5.874898, -35.300799], [-5.874978, -35.300801], [-5.875029, -35.300833], [-5.87506, -35.300871], [-5.875095, -35.300916], [-5.875165, -35.301086], [-5.875656, -35.300871], [-5.875607, -35.300713], [-5.875601, -35.300605], [-5.875634, -35.300524], [-5.875684, -35.30048], [-5.878759, -35.299128], [-5.8792, -35.297781], [-5.871026, -35.301366], [-5.871444, -35.302351]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
