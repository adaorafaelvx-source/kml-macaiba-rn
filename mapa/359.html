<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 359</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 359</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8504175555555555, -35.31790244444445], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.850383, -35.315361], [-5.849512, -35.316178], [-5.848778, -35.317042], [-5.847654, -35.318293], [-5.847682, -35.318466], [-5.847955, -35.319964], [-5.848298, -35.320862], [-5.848522, -35.32084], [-5.850892, -35.319854], [-5.852535, -35.319175], [-5.852922, -35.31899], [-5.852599, -35.317973], [-5.852327, -35.317327], [-5.852172, -35.317077], [-5.852095, -35.316957], [-5.851719, -35.316552], [-5.851088, -35.315972], [-5.850383, -35.315361]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
