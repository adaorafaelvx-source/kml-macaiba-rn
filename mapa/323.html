<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 323</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 323</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.843145291666667, -35.334299208333334], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.839435, -35.333933], [-5.839989, -35.334664], [-5.84033, -35.33516], [-5.84056, -35.335434], [-5.841758, -35.337065], [-5.842781, -35.336449], [-5.842899, -35.33632], [-5.843272, -35.336132], [-5.843635, -35.335875], [-5.844318, -35.335424], [-5.844681, -35.33522], [-5.845129, -35.334936], [-5.845492, -35.334673], [-5.845711, -35.334576], [-5.845834, -35.33448], [-5.845834, -35.33441], [-5.844953, -35.33286], [-5.8449, -35.332715], [-5.84396, -35.331178], [-5.843811, -35.331229], [-5.842456, -35.332093], [-5.842285, -35.332141], [-5.842029, -35.332281], [-5.839435, -35.333933]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
