<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 411</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 411</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8715322500000005, -35.3076995], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.876945, -35.304441], [-5.873196, -35.306187], [-5.871191, -35.307119], [-5.869131, -35.308035], [-5.868853, -35.307467], [-5.864785, -35.30938], [-5.862966, -35.310261], [-5.863798, -35.31182], [-5.87003, -35.309223], [-5.872657, -35.308194], [-5.873397, -35.307959], [-5.873839, -35.307882], [-5.874045, -35.307898], [-5.875721, -35.30842], [-5.877017, -35.304465], [-5.876945, -35.304441]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
