<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 301</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 301</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.84666025, -35.304413375], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.845796, -35.303572], [-5.845923, -35.304026], [-5.846029, -35.304257], [-5.846352, -35.304791], [-5.846531, -35.305158], [-5.846678, -35.305692], [-5.847124, -35.307634], [-5.848666, -35.306974], [-5.848448, -35.304309], [-5.847874, -35.302891], [-5.846934, -35.3033], [-5.846527, -35.303495], [-5.846019, -35.303705], [-5.845971, -35.303704], [-5.845896, -35.303534], [-5.845796, -35.303572]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
