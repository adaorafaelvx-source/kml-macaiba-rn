<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 339</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 339</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.821844052631579, -35.31467257894737], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.823582, -35.313207], [-5.823127, -35.313344], [-5.821677, -35.313705], [-5.821537, -35.313694], [-5.821509, -35.313708], [-5.821255, -35.314071], [-5.820903, -35.314652], [-5.820706, -35.315002], [-5.820639, -35.315159], [-5.82055, -35.315395], [-5.820852, -35.315451], [-5.82133, -35.315554], [-5.821483, -35.315599], [-5.821985, -35.315881], [-5.822113, -35.315779], [-5.822373, -35.315616], [-5.822606, -35.315499], [-5.823228, -35.314256], [-5.823582, -35.313207]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
