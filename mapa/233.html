<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 233</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 233</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.836514, -35.335196095238096], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.836398, -35.335324], [-5.836423, -35.335344], [-5.836459, -35.335358], [-5.8365, -35.335363], [-5.83655, -35.335358], [-5.836587, -35.335342], [-5.836633, -35.335305], [-5.836663, -35.335262], [-5.836682, -35.335206], [-5.836687, -35.335151], [-5.836677, -35.33511], [-5.836651, -35.335051], [-5.836615, -35.335018], [-5.836549, -35.334992], [-5.836478, -35.335], [-5.836423, -35.335023], [-5.836378, -35.335064], [-5.836354, -35.335109], [-5.836338, -35.335164], [-5.836351, -35.33525], [-5.836398, -35.335324]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
