<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 046</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 046</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8606138125, -35.3465010625], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.85994, -35.346061], [-5.859996, -35.346263], [-5.860087, -35.346324], [-5.860376, -35.346504], [-5.860726, -35.346722], [-5.860741, -35.346744], [-5.860727, -35.346778], [-5.860294, -35.347016], [-5.860513, -35.347381], [-5.861292, -35.346925], [-5.861103, -35.346534], [-5.861207, -35.346381], [-5.861132, -35.346287], [-5.8611, -35.34601], [-5.860647, -35.346026], [-5.85994, -35.346061]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
