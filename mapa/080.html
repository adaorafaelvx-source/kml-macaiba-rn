<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 080</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 080</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8629876, -35.35086605], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.862186, -35.351018], [-5.86325, -35.351666], [-5.863372, -35.351682], [-5.863494, -35.351605], [-5.86348, -35.351402], [-5.863476, -35.351154], [-5.863427, -35.35085], [-5.863419, -35.35065], [-5.863494, -35.350151], [-5.863222, -35.350248], [-5.86309, -35.350281], [-5.862858, -35.350314], [-5.862969, -35.35057], [-5.862975, -35.35061], [-5.862954, -35.35064], [-5.86272, -35.35077], [-5.862644, -35.350801], [-5.862318, -35.350932], [-5.862218, -35.350959], [-5.862186, -35.351018]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
