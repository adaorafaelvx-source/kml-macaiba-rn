<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 032</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 032</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.857139571428571, -35.346880999999996], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.856297, -35.346054], [-5.856233, -35.346185], [-5.856148, -35.346332], [-5.85611, -35.346425], [-5.856064, -35.346519], [-5.856026, -35.346643], [-5.855989, -35.346693], [-5.855973, -35.346778], [-5.855961, -35.34691], [-5.856315, -35.34699], [-5.856683, -35.34717], [-5.856838, -35.347229], [-5.857461, -35.347527], [-5.857835, -35.347712], [-5.858972, -35.348241], [-5.85911, -35.347871], [-5.859124, -35.347455], [-5.859105, -35.347345], [-5.858756, -35.346176], [-5.858634, -35.346192], [-5.856297, -35.346054]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
