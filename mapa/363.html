<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 363</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 363</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.837926866666667, -35.28816193333333], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.84085, -35.29436], [-5.84148, -35.293667], [-5.841333, -35.293152], [-5.841261, -35.292734], [-5.841085, -35.292136], [-5.838555, -35.282936], [-5.838232, -35.282995], [-5.838019, -35.283081], [-5.837811, -35.283212], [-5.837613, -35.283352], [-5.837346, -35.283488], [-5.837, -35.283483], [-5.836332, -35.283279], [-5.836282, -35.283322], [-5.836255, -35.283392], [-5.836178, -35.283762], [-5.835852, -35.284709], [-5.83574, -35.285087], [-5.835628, -35.286793], [-5.8355, -35.288885], [-5.835545, -35.289145], [-5.83562, -35.289362], [-5.835775, -35.289612], [-5.836204, -35.290122], [-5.837229, -35.291245], [-5.838304, -35.292087], [-5.839021, -35.292998], [-5.840246, -35.293902], [-5.84066, -35.2942], [-5.84085, -35.29436]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
