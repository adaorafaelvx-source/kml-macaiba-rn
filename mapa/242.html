<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 242</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 242</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.834737235294118, -35.32853876470588], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.833915, -35.32716], [-5.833576, -35.32778], [-5.833296, -35.328035], [-5.83289, -35.328113], [-5.83541, -35.329822], [-5.835483, -35.3297], [-5.835707, -35.329548], [-5.835801, -35.329535], [-5.835922, -35.32958], [-5.836106, -35.329492], [-5.835679, -35.328961], [-5.834969, -35.328466], [-5.834793, -35.328323], [-5.83459, -35.328129], [-5.834341, -35.327832], [-5.83414, -35.327523], [-5.833915, -35.32716]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
