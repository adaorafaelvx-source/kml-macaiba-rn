<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 266</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 266</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8549146428571435, -35.31224607142857], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.85675, -35.311928], [-5.856572, -35.311537], [-5.855307, -35.309764], [-5.853813, -35.310424], [-5.854587, -35.312387], [-5.854533, -35.312656], [-5.854285, -35.312762], [-5.854319, -35.312892], [-5.854073, -35.312996], [-5.853823, -35.313108], [-5.853931, -35.313364], [-5.854937, -35.312931], [-5.855125, -35.312768], [-5.85675, -35.311928]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
