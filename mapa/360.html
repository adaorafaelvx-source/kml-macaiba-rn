<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 360</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 360</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8449948478260865, -35.315769913043475], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.841864, -35.313258], [-5.84164, -35.313333], [-5.841885, -35.313902], [-5.841928, -35.314669], [-5.842093, -35.315286], [-5.842365, -35.315768], [-5.842451, -35.31616], [-5.8422, -35.316793], [-5.841922, -35.317212], [-5.841853, -35.317624], [-5.841832, -35.317877], [-5.842061, -35.318043], [-5.842376, -35.31808], [-5.84284, -35.317984], [-5.843534, -35.317673], [-5.844036, -35.317367], [-5.844206, -35.317077], [-5.844511, -35.316938], [-5.845274, -35.316453], [-5.845376, -35.316035], [-5.84552, -35.315826], [-5.845754, -35.315868], [-5.846016, -35.316083], [-5.84632, -35.316083], [-5.84648, -35.316147], [-5.846795, -35.316142], [-5.846971, -35.316389], [-5.847179, -35.316738], [-5.847286, -35.316823], [-5.847297, -35.317145], [-5.847526, -35.317306], [-5.847435, -35.317623], [-5.847425, -35.31796], [-5.847654, -35.318293], [-5.848778, -35.317042], [-5.849512, -35.316178], [-5.850383, -35.315361], [-5.848328, -35.313577], [-5.847784, -35.313056], [-5.847565, -35.312719], [-5.847421, -35.312263], [-5.847234, -35.312096], [-5.843744, -35.312185], [-5.842977, -35.312671], [-5.842268, -35.313052], [-5.841864, -35.313258]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
