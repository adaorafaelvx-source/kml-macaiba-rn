<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 115</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 115</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.856248588235294, -35.34890835294118], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.856022, -35.348258], [-5.855967, -35.348535], [-5.855954, -35.348652], [-5.855962, -35.348741], [-5.856086, -35.349182], [-5.856232, -35.34963], [-5.856302, -35.349804], [-5.856319, -35.349901], [-5.856454, -35.349776], [-5.856414, -35.34954], [-5.856392, -35.349259], [-5.856502, -35.348677], [-5.856502, -35.348497], [-5.856474, -35.348354], [-5.856343, -35.348213], [-5.856279, -35.348165], [-5.856022, -35.348258]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
