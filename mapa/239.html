<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 239</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 239</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.835802285714286, -35.32788142857142], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.834622, -35.3281], [-5.834812, -35.328271], [-5.83505, -35.328461], [-5.83572, -35.328928], [-5.836172, -35.329485], [-5.837707, -35.3277], [-5.837112, -35.32688], [-5.8371, -35.326892], [-5.836723, -35.327168], [-5.836117, -35.327384], [-5.835402, -35.327588], [-5.835114, -35.327682], [-5.834959, -35.327701], [-5.834622, -35.3281]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
