<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 151</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 151</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.849232647058823, -35.34338329411765], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.847995, -35.344291], [-5.84863, -35.3449], [-5.84873, -35.344735], [-5.84894, -35.344366], [-5.849052, -35.344109], [-5.849451, -35.343421], [-5.849553, -35.343292], [-5.849694, -35.343135], [-5.849753, -35.343063], [-5.84982, -35.342955], [-5.84982, -35.342888], [-5.849756, -35.342768], [-5.849641, -35.342577], [-5.849508, -35.342346], [-5.849374, -35.342226], [-5.849243, -35.342153], [-5.847995, -35.344291]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
