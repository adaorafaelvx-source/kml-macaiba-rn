<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 427</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 427</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.855834608695652, -35.29137786956522], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.860115, -35.29136], [-5.85956, -35.290225], [-5.858029, -35.290848], [-5.85777, -35.290327], [-5.857725, -35.290298], [-5.857687, -35.290287], [-5.85765, -35.290298], [-5.856261, -35.290981], [-5.855834, -35.290131], [-5.854516, -35.290508], [-5.853884, -35.288247], [-5.852214, -35.288726], [-5.85343, -35.291162], [-5.854039, -35.292397], [-5.854194, -35.292708], [-5.854315, -35.292814], [-5.854365, -35.292895], [-5.854416, -35.292983], [-5.85445, -35.293064], [-5.854474, -35.293146], [-5.854506, -35.293306], [-5.854647, -35.29362], [-5.860115, -35.29136]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
