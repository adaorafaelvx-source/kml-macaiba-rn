<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 008</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 008</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.857386000000001, -35.34141966666667], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.857145, -35.34178], [-5.858089, -35.341675], [-5.858015, -35.340784], [-5.856817, -35.340894], [-5.857105, -35.341605], [-5.857145, -35.34178]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
