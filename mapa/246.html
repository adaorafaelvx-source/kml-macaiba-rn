<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 246</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 246</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.852752233333334, -35.315573699999995], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.850631, -35.315441], [-5.851237, -35.315968], [-5.851399, -35.316122], [-5.851811, -35.316481], [-5.852096, -35.316244], [-5.85231, -35.316098], [-5.852446, -35.316023], [-5.852292, -35.31565], [-5.852322, -35.315627], [-5.852486, -35.316004], [-5.85258, -35.315956], [-5.852987, -35.31579], [-5.853255, -35.315712], [-5.85345, -35.31558], [-5.853229, -35.3152], [-5.853253, -35.315183], [-5.853477, -35.315554], [-5.853875, -35.315139], [-5.853891, -35.315169], [-5.853523, -35.315572], [-5.853562, -35.315634], [-5.854038, -35.315495], [-5.854127, -35.315485], [-5.854226, -35.31553], [-5.855012, -35.315158], [-5.854611, -35.314118], [-5.85166, -35.315433], [-5.851476, -35.31502], [-5.850674, -35.315384], [-5.850631, -35.315441]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
