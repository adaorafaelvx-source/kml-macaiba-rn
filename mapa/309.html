<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 309</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 309</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.849270875, -35.3063818125], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.849131, -35.305873], [-5.848493, -35.304291], [-5.848448, -35.304309], [-5.848666, -35.306974], [-5.848758, -35.307178], [-5.848743, -35.307183], [-5.848755, -35.307208], [-5.849033, -35.307076], [-5.849324, -35.306953], [-5.849457, -35.307273], [-5.850411, -35.306913], [-5.850381, -35.306827], [-5.850463, -35.306801], [-5.849958, -35.305523], [-5.849182, -35.305854], [-5.849131, -35.305873]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
