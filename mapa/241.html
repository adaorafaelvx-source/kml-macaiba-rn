<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 241</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 241</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.834696466666667, -35.3267716], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.834202, -35.327528], [-5.834287, -35.327656], [-5.834345, -35.327755], [-5.834594, -35.328071], [-5.83496, -35.327629], [-5.835274, -35.327259], [-5.835859, -35.326799], [-5.836022, -35.32662], [-5.83655, -35.326205], [-5.836289, -35.325859], [-5.833898, -35.324367], [-5.83302, -35.325631], [-5.833331, -35.326092], [-5.833614, -35.326575], [-5.834202, -35.327528]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
