<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 216</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 216</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8361917, -35.33100065], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.835318, -35.331915], [-5.836291, -35.332381], [-5.83691, -35.33268], [-5.837538, -35.332979], [-5.837708, -35.332594], [-5.837856, -35.332212], [-5.837865, -35.331985], [-5.836131, -35.329524], [-5.835928, -35.329619], [-5.83579, -35.329574], [-5.835721, -35.329584], [-5.835508, -35.32973], [-5.835454, -35.329834], [-5.835708, -35.330105], [-5.835882, -35.330235], [-5.835918, -35.330318], [-5.835818, -35.330706], [-5.83564, -35.330956], [-5.835532, -35.331167], [-5.835318, -35.331915]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
