<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 391</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 391</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.850781444444444, -35.28409244444444], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.850307, -35.283984], [-5.850463, -35.284299], [-5.850492, -35.284337], [-5.85054, -35.284349], [-5.851249, -35.284153], [-5.851267, -35.284101], [-5.851229, -35.283896], [-5.851179, -35.283729], [-5.850307, -35.283984]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
