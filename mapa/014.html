<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 014</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 014</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.856157277777778, -35.342774222222225], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.85717, -35.343071], [-5.856527, -35.343074], [-5.856482, -35.342846], [-5.856426, -35.342639], [-5.856394, -35.342194], [-5.856391, -35.342147], [-5.856174, -35.342155], [-5.855134, -35.342178], [-5.855192, -35.342244], [-5.855275, -35.342359], [-5.85537, -35.342557], [-5.855475, -35.342833], [-5.85552, -35.343177], [-5.855524, -35.343382], [-5.856602, -35.343347], [-5.856813, -35.343339], [-5.857192, -35.343323], [-5.85717, -35.343071]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
