<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 243</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 243</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.832183263157894, -35.32532763157895], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.831363, -35.324658], [-5.831966, -35.326428], [-5.83289, -35.328113], [-5.833296, -35.328035], [-5.833576, -35.32778], [-5.833915, -35.32716], [-5.83325, -35.326064], [-5.832961, -35.325625], [-5.832412, -35.32479], [-5.832248, -35.324572], [-5.831962, -35.324286], [-5.831705, -35.324084], [-5.83149, -35.323946], [-5.831436, -35.323948], [-5.831406, -35.323976], [-5.831384, -35.324026], [-5.831432, -35.324487], [-5.831427, -35.324589], [-5.831363, -35.324658]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
