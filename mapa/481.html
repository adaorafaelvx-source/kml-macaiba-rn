<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 481</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold;
           white-space:nowrap; }
</style>
</head>
<body>
<div id="info">Quadra 481</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.853345409090909, -35.336385772727276], 17);

// Google Maps Satellite + Roads (híbrido)
L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: '© Google Maps',
  maxZoom: 21
}).addTo(map);

var coords = [[-5.851695, -35.336959], [-5.85185, -35.337248], [-5.852357, -35.337484], [-5.85297, -35.337528], [-5.853632, -35.337533], [-5.854321, -35.337432], [-5.857064, -35.336695], [-5.856893, -35.336144], [-5.856205, -35.33468], [-5.855161, -35.335067], [-5.854941, -35.334564], [-5.854908, -35.33449], [-5.852551, -35.335375], [-5.85263, -35.335744], [-5.852646, -35.336098], [-5.852517, -35.336485], [-5.852282, -35.336718], [-5.851999, -35.336756], [-5.851831, -35.336775], [-5.851748, -35.33685], [-5.851703, -35.336903], [-5.851695, -35.336959]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.35,
  weight: 3
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
