<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadra 400</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin:0; padding:0; }
  #map { height:100vh; width:100vw; }
  #info { position:absolute; top:10px; left:50%; transform:translateX(-50%);
           background:white; padding:8px 16px; border-radius:20px;
           box-shadow:0 2px 8px rgba(0,0,0,0.3); z-index:1000;
           font-family:sans-serif; font-size:14px; font-weight:bold; }
</style>
</head>
<body>
<div id="info">Quadra 400</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([-5.8484748125, -35.2994611875], 17);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);
var coords = [[-5.847389, -35.298969], [-5.846963, -35.299188], [-5.846965, -35.299248], [-5.847128, -35.299882], [-5.847148, -35.299983], [-5.847119, -35.30008], [-5.847065, -35.300138], [-5.845156, -35.300956], [-5.845296, -35.301404], [-5.845402, -35.301772], [-5.847525, -35.300941], [-5.847596, -35.30118], [-5.856483, -35.297513], [-5.855522, -35.295587], [-5.855451, -35.295569], [-5.847389, -35.298969]];
var polygon = L.polygon(coords, {
  color: '#4285F4',
  fillColor: '#4285F4',
  fillOpacity: 0.4,
  weight: 2
}).addTo(map);
map.fitBounds(polygon.getBounds());
</script>
</body>
</html>
